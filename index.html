<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#eef3ec">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="Calculadoras financieras modernas: interés compuesto, préstamos, hipotecas e inversión con resultados instantáneos, modo oscuro y diseño adaptable para Android.">
  <meta name="keywords" content="calculadora de interés compuesto, calculadora de préstamos, calculadora de hipotecas, calculadora de inversión, finanzas personales">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="Calculadoras financieras modernas">
  <meta property="og:description" content="Calcula interés compuesto, préstamos, hipotecas e inversiones desde una interfaz minimalista y responsive.">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="es_ES">
  <title>Calculadora de interés compuesto, préstamos, hipotecas e inversión</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Calculadoras financieras modernas",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Android, iOS, Windows, macOS, Linux",
      "inLanguage": "es",
      "description": "Suite de calculadoras para interés compuesto, préstamos, hipotecas e inversión."
    }
  </script>
</head>
<body>
  <main class="shell">
    <section class="workspace" aria-label="Calculadoras financieras">
      <aside class="side-panel">
        <div class="brand-block">
          <span class="brand-mark" aria-hidden="true">F</span>
          <div>
            <p class="eyebrow">Suite privada</p>
            <h1>Calculadoras financieras</h1>
          </div>
        </div>

        <nav class="tool-list" aria-label="Seleccionar calculadora">
          <button class="tool-tab active" type="button" data-tool="compound">
            <span class="tab-icon" aria-hidden="true">%</span>
            <span>
              <strong>Interés compuesto</strong>
              <small>Crecimiento por aportes</small>
            </span>
          </button>
          <button class="tool-tab" type="button" data-tool="loan">
            <span class="tab-icon" aria-hidden="true">$</span>
            <span>
              <strong>Préstamos</strong>
              <small>Cuota y costo total</small>
            </span>
          </button>
          <button class="tool-tab" type="button" data-tool="mortgage">
            <span class="tab-icon" aria-hidden="true">H</span>
            <span>
              <strong>Hipotecas</strong>
              <small>Pago, seguros e impuestos</small>
            </span>
          </button>
          <button class="tool-tab" type="button" data-tool="investment">
            <span class="tab-icon" aria-hidden="true">↗</span>
            <span>
              <strong>Inversión</strong>
              <small>Meta y rendimiento real</small>
            </span>
          </button>
        </nav>

        <div class="side-actions">
          <label class="language-picker">
            <span id="language-label">Idioma</span>
            <select id="language-select" aria-label="Seleccionar idioma">
              <option value="es">Español</option>
              <option value="en">English</option>
              <option value="it">Italiano</option>
              <option value="fr">Français</option>
              <option value="pt">Português</option>
              <option value="de">Deutsch</option>
            </select>
          </label>

          <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Cambiar a modo oscuro">
            <span class="theme-dot" aria-hidden="true"></span>
            <span id="theme-label">Modo oscuro</span>
          </button>
        </div>
      </aside>

      <section class="calculator-panel">
        <header class="panel-header">
          <div>
            <p class="eyebrow" id="tool-kicker">Crecimiento futuro</p>
            <h2 id="tool-title">Interés compuesto</h2>
          </div>
          <div class="summary-chip">
            <span id="primary-label">Valor futuro</span>
            <strong id="primary-result">$0</strong>
          </div>
        </header>

        <section class="content-grid">
          <form class="form-card active" id="compound-form" data-form="compound">
            <label>
              Capital inicial
              <input type="number" inputmode="decimal" name="principal" value="10000" min="0" step="100">
            </label>
            <label>
              Aporte mensual
              <input type="number" inputmode="decimal" name="monthly" value="250" min="0" step="25">
            </label>
            <label>
              Tasa anual (%)
              <input type="number" inputmode="decimal" name="rate" value="8" min="0" step="0.1">
            </label>
            <label>
              Tiempo (años)
              <input type="number" inputmode="numeric" name="years" value="15" min="1" step="1">
            </label>
            <label>
              Capitalización
              <select name="frequency">
                <option value="12">Mensual</option>
                <option value="4">Trimestral</option>
                <option value="1">Anual</option>
                <option value="365">Diaria</option>
              </select>
            </label>
          </form>

          <form class="form-card" id="loan-form" data-form="loan">
            <label>
              Monto del préstamo
              <input type="number" inputmode="decimal" name="amount" value="18000" min="0" step="100">
            </label>
            <label>
              Tasa anual (%)
              <input type="number" inputmode="decimal" name="rate" value="10.5" min="0" step="0.1">
            </label>
            <label>
              Plazo (meses)
              <input type="number" inputmode="numeric" name="months" value="60" min="1" step="1">
            </label>
            <label>
              Cargo inicial
              <input type="number" inputmode="decimal" name="fee" value="250" min="0" step="25">
            </label>
          </form>

          <form class="form-card" id="mortgage-form" data-form="mortgage">
            <label>
              Precio de la vivienda
              <input type="number" inputmode="decimal" name="price" value="380000" min="0" step="1000">
            </label>
            <label>
              Inicial / enganche
              <input type="number" inputmode="decimal" name="down" value="76000" min="0" step="1000">
            </label>
            <label>
              Tasa anual (%)
              <input type="number" inputmode="decimal" name="rate" value="6.4" min="0" step="0.1">
            </label>
            <label>
              Plazo (años)
              <input type="number" inputmode="numeric" name="years" value="30" min="1" step="1">
            </label>
            <label>
              Impuestos anuales
              <input type="number" inputmode="decimal" name="taxes" value="4200" min="0" step="100">
            </label>
            <label>
              Seguro anual
              <input type="number" inputmode="decimal" name="insurance" value="1500" min="0" step="100">
            </label>
          </form>

          <form class="form-card" id="investment-form" data-form="investment">
            <label>
              Inversión inicial
              <input type="number" inputmode="decimal" name="principal" value="15000" min="0" step="100">
            </label>
            <label>
              Aporte mensual
              <input type="number" inputmode="decimal" name="monthly" value="400" min="0" step="25">
            </label>
            <label>
              Rendimiento anual (%)
              <input type="number" inputmode="decimal" name="returnRate" value="9" min="-50" step="0.1">
            </label>
            <label>
              Inflación anual (%)
              <input type="number" inputmode="decimal" name="inflation" value="3" min="0" step="0.1">
            </label>
            <label>
              Horizonte (años)
              <input type="number" inputmode="numeric" name="years" value="20" min="1" step="1">
            </label>
            <label>
              Meta
              <input type="number" inputmode="decimal" name="goal" value="250000" min="0" step="1000">
            </label>
          </form>

          <section class="result-card" aria-live="polite">
            <div class="meter-wrap">
              <div class="meter" aria-label="Indicador circular de resultado">
                <div class="meter-core">
                  <span id="meter-label">Progreso</span>
                  <strong id="meter-value">0%</strong>
                </div>
              </div>
            </div>

            <div class="result-list" id="result-list"></div>
          </section>
        </section>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
